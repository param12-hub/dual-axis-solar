

<!DOCTYPE html>
<html>

<head>

<title>Solar Tracker Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
font-size:22px;
}

.value{
font-size:32px;
color:#38bdf8;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Solar Tracker Dashboard</h1>
  <h2>Major Project by Bethi Nikhil(b200457) & T.Nagasri(b201402)</h2>

<div class="container">

<div class="card">
Sun X
<div id="sunX" class="value">0</div>
</div>

<div class="card">
Sun Y
<div id="sunY" class="value">0</div>
</div>

<div class="card">
Panel X
<div id="panelX" class="value">0</div>
</div>

<div class="card">
Panel Y
<div id="panelY" class="value">0</div>
</div>

<div class="card">
Error X
<div id="errorX" class="value">0</div>
</div>

<div class="card">
Error Y
<div id="errorY" class="value">0</div>
</div>

</div>

<h2>Manual Control</h2>

<button onclick="sendCmd('left')">⬅ LEFT</button>
<button onclick="sendCmd('right')">RIGHT ➡</button>

<br>

<button onclick="sendCmd('up')">⬆ UP</button>
<button onclick="sendCmd('down')">⬇ DOWN</button>

<script>

async function update(){

let res = await fetch("/data");
let d = await res.json();

document.getElementById("sunX").innerText=d.sunX;
document.getElementById("sunY").innerText=d.sunY;
document.getElementById("panelX").innerText=d.panelX;
document.getElementById("panelY").innerText=d.panelY;
document.getElementById("errorX").innerText=d.errorX;
document.getElementById("errorY").innerText=d.errorY;

}

async function sendCmd(cmd){

await fetch("/cmd?move="+cmd);

}

setInterval(update,1000);

</script>

</body>

</html>
